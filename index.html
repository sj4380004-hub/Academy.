      { id:5, name:"فاطمة حسن", email:"fatima@student.com", password:"student123", role:"student", status:"banned", joined:"2024-05-01", avatar:"ف" },
    ];

    function _load() {
      try { const r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(_) {}
      _save(defaultUsers); return defaultUsers;
    }
    function _save(users) { try { localStorage.setItem(KEY, JSON.stringify(users)); } catch(_) {} }
    function _sanitize(u) { const {password, ...safe} = u; return safe; }

    function getAll() { return _load(); }
    function getAllSafe() { return _load().map(_sanitize); }
    function findByEmail(email) { return _load().find(u => u.email.toLowerCase() === email.toLowerCase()) || null; }
    function findById(id) { return _load().find(u => u.id === id) || null; }

    function register({name, email, password}) {
      const users = _load();
      if (!name || name.trim().length < 2) return { ok:false, error:"الاسم يجب أن يحتوي على حرفين على الأقل" };
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return { ok:false, error:"البريد الإلكتروني غير صحيح" };
      if (!password || password.length < 6) return { ok:false, error:"كلمة المرور يجب أن تكون 6 أحرف على الأقل" };
      if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) return { ok:false, error:"البريد الإلكتروني مسجل مسبقاً" };
      const newUser = { id:Date.now(), name:name.trim(), email:email.toLowerCase().trim(), password, role:"student", status:"active", joined:new Date().toISOString().split("T")[0], avatar:name.trim()[0] };
      users.push(newUser); _save(users);
      return { ok:true, user:_sanitize(newUser) };
    }

    function login({email, password}) {
      const user = findByEmail(email);
      if (!user) return { ok:false, error:"البريد الإلكتروني غير مسجل" };
      if (user.password !== password) return { ok:false, error:"كلمة المرور غير صحيحة" };
      if (user.status === "banned") return { ok:false, error:"هذا الحساب موقوف، تواصل مع الإدارة" };
      return { ok:true, user:_sanitize(user) };
    }

    function remove(id) { _save(_load().filter(u => u.id !== id)); }
    function toggleBan(id) { _save(_load().map(u => u.id===id ? {...u, status: u.status==="banned"?"active":"banned"} : u)); }
    function update(id, fields) { _save(_load().map(u => u.id===id ? {...u, ...fields} : u)); }
    function addUser({name, email, password="123456", role="student"}) {
      const result = register({name, email, password});
      if (result.ok && role !== "student") update(result.user.id, {role});
      return result;
    }
    function reset() { _save(defaultUsers); }

    return { getAll, getAllSafe, findByEmail, findById, register, login, remove, toggleBan, update, addUser, reset };
  })();

function extractYouTubeId(url) {
  if (!url) return "";
  const patterns = [
    /youtu\.be\/([^?&]+)/,
    /youtube\.com\/watch\?v=([^&]+)/,
    /youtube\.com\/embed\/([^?&]+)/,
    /^([a-zA-Z0-9_-]{11})$/,
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return url;
}

// =================== COURSE VIEW ===================
function CourseViewPage({ course, setPage, user, notify, data, setData }) {
  const [selectedVideo, setSelectedVideo] = useState(null);
  const [quizState, setQuizState] = useState(null);
  const [selectedAnswers, setSelectedAnswers] = useState({});
  const [score, setScore] = useState(0);

  if (!course) return null;
  const videos = course.videos || [];

  const openVideo = (v) => {
    setSelectedVideo(v);
    setQuizState(null);
    setSelectedAnswers({});
    setScore(0);
  };

  const startQuiz = () => {
    setQuizState("active");
    setSelectedAnswers({});
  };

  const selectAnswer = (qi, ai) => {
    if (quizState === "done") return;
    setSelectedAnswers(prev => ({ ...prev, [qi]: ai }));
  };

  const submitQuiz = () => {
    let s = 0;
    selectedVideo.quiz.forEach((q, i) => {
      if (selectedAnswers[i] === q.answer) s++;
    });
    setScore(s);
    setQuizState("done");
    notify(`أنهيت الامتحان! نتيجتك: ${s}/${selectedVideo.quiz.length}`);
  };

  const getOptionClass = (qi, ai) => {
    if (quizState !== "done") return selectedAnswers[qi] === ai ? "quiz-option selected" : "quiz-option";
    if (ai === selectedVideo.quiz[qi].answer) return "quiz-option correct";
    if (selectedAnswers[qi] === ai) return "quiz-option wrong";
    return "quiz-option";
  };

  return (
    <div>
      <div style={{ background:"rgba(108,71,255,0.08)", padding:"20px 40px", borderBottom:"1px solid rgba(108,71,255,0.1)", display:"flex", alignItems:"center", gap:16 }}>
        <button onClick={() => setPage("courses")} style={{ background:"transparent", border:"none", color:"#a78bfa", cursor:"pointer", fontSize:20 }}>←</button>
        <div>
          <h1 style={{ fontSize:24, fontWeight:700 }}>{course.title}</h1>
          <p style={{ color:"#8888a8", fontSize:14 }}>{videos.length} فيديو</p>
        </div>
      </div>

      <div style={{ display:"flex", gap:0 }}>
        <div style={{ flex:1, padding:32, overflowY:"auto", maxHeight:"calc(100vh - 130px)" }}>
          {selectedVideo ? (
            <div>
              {selectedVideo.youtubeId ? (
                <iframe
                  className="yt-embed"
                  src={`https://www.youtube.com/embed/${selectedVideo.youtubeId}`}
                  title={selectedVideo.title}
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                  allowFullScreen
                />
              ) : (
                <div style={{ background:"rgba(0,0,0,0.6)", borderRadius:16, aspectRatio:"16/9", display:"flex", alignItems:"center", justifyContent:"center", border:"1px solid rgba(108,71,255,0.2)" }}>
                  <div style={{ textAlign:"center" }}>
                    <div style={{ fontSize:60, marginBottom:12 }}>▶️</div>
                    <p style={{ color:"#a78bfa" }}>لم يتم إضافة رابط يوتيوب لهذا الفيديو بعد</p>
                  </div>
                </div>
              )}
              <h2 style={{ fontSize:20, fontWeight:700, marginTop:20, marginBottom:8 }}>{selectedVideo.title}</h2>
              <p style={{ color:"#8888a8", fontSize:13, marginBottom:20 }}>⏱ {selectedVideo.duration}</p>

              {/* امتحان ملف PDF أو صورة */}
              {selectedVideo.quizFile && (
                <div style={{ marginTop:24 }}>
                  <div style={{ background:"rgba(108,71,255,0.08)", border:"1px solid rgba(108,71,255,0.2)", borderRadius:16, padding:24 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                      <h3 style={{ fontSize:17, fontWeight:700 }}>
                        {selectedVideo.quizFile.type === "application/pdf" ? "📄 ورقة الأسئلة" : "🖼️ صورة الأسئلة"}
                      </h3>
                      <a href={selectedVideo.quizFile.data} download={selectedVideo.quizFile.name}
                        style={{ background:"linear-gradient(135deg,#6c47ff,#a855f7)", color:"white", padding:"7px 16px", borderRadius:10, fontSize:13, fontWeight:600, textDecoration:"none" }}>
                        ⬇ تحميل
                      </a>
                    </div>
                    {selectedVideo.quizFile.type === "application/pdf" ? (
                      <iframe src={selectedVideo.quizFile.data} style={{ width:"100%", height:500, borderRadius:10, border:"1px solid rgba(108,71,255,0.2)" }} />
                    ) : (
                      <img src={selectedVideo.quizFile.data} alt="أسئلة الامتحان"
                        style={{ width:"100%", borderRadius:10, border:"1px solid rgba(108,71,255,0.2)", display:"block" }} />
                    )}
                  </div>
                </div>
              )}

              {/* امتحان أسئلة نصية */}
              {(!selectedVideo.quizFile) && selectedVideo.quiz && selectedVideo.quiz.length > 0 && (
                <div style={{ marginTop:24 }}>
                  <div style={{ background:"rgba(108,71,255,0.08)", border:"1px solid rgba(108,71,255,0.2)", borderRadius:16, padding:24 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                      <h3 style={{ fontSize:17, fontWeight:700 }}>📝 امتحان الفيديو</h3>
                      {quizState === null && (
                        <button className="btn-primary" style={{ padding:"8px 20px", fontSize:13 }} onClick={startQuiz}>ابدأ الامتحان</button>
                      )}
                      {quizState === "done" && (
                        <span style={{ background:"rgba(34,197,94,0.15)", border:"1px solid #4ade80", color:"#4ade80", padding:"6px 16px", borderRadius:20, fontWeight:700 }}>
                          ✓ النتيجة: {score}/{selectedVideo.quiz.length}
                        </span>
                      )}
                    </div>
                    {quizState === null && (
                      <p style={{ color:"#8888a8", fontSize:14 }}>أنهِ مشاهدة الفيديو ثم اختبر فهمك بالإجابة على أسئلة الامتحان.</p>
                    )}
                    {(quizState === "active" || quizState === "done") && (
                      <div>
                        {selectedVideo.quiz.map((q, qi) => (
                          <div key={qi} style={{ marginBottom:20 }}>
                            <p style={{ fontWeight:600, marginBottom:12, fontSize:15 }}>{qi+1}. {q.q}</p>
                            {q.options.map((opt, ai) => (
                              <div key={ai} className={getOptionClass(qi, ai)} onClick={() => selectAnswer(qi, ai)}>
                                {String.fromCharCode(65+ai)}. {opt}
                              </div>
                            ))}
                          </div>
                        ))}
                        {quizState === "active" && (
                          <button className="btn-primary" style={{ marginTop:8 }} onClick={submitQuiz}
                            disabled={Object.keys(selectedAnswers).length < selectedVideo.quiz.length}>
                            تسليم الإجابات
                          </button>
                        )}
                        {quizState === "done" && (
                          <button className="btn-outline" style={{ marginTop:8 }} onClick={() => { setQuizState("active"); setSelectedAnswers({}); }}>
                            إعادة المحاولة
                          </button>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              )}
            </div>
          ) : (
            <div style={{ background:"rgba(108,71,255,0.05)", borderRadius:16, aspectRatio:"16/9", display:"flex", alignItems:"center", justifyContent:"center", border:"1px solid rgba(108,71,255,0.1)" }}>
              <div style={{ textAlign:"center" }}>
                <div style={{ fontSize:40, marginBottom:12 }}>🎓</div>
                <p style={{ color:"#8888a8" }}>اختر فيديواً من القائمة الجانبية لبدء المشاهدة</p>
              </div>
            </div>
          )}
        </div>

        <div style={{ width:300, background:"rgba(255,255,255,0.02)", borderRight:"1px solid rgba(108,71,255,0.1)", padding:20, overflowY:"auto", maxHeight:"calc(100vh - 130px)" }}>
          <h3 style={{ fontWeight:700, marginBottom:16, fontSize:16 }}>📹 الفيديوهات</h3>
          {videos.length === 0 && (
            <p style={{ color:"#8888a8", fontSize:13 }}>لم تتم إضافة فيديوهات بعد.</p>
          )}
          {videos.map((v, idx) => (
            <div key={v.id} onClick={() => openVideo(v)}
              style={{ padding:"12px 14px", borderRadius:10, cursor:"pointer", marginBottom:8,
                background: selectedVideo && selectedVideo.id===v.id ? "rgba(108,71,255,0.2)" : "rgba(255,255,255,0.02)",
                border:`1px solid ${selectedVideo && selectedVideo.id===v.id ? "rgba(108,71,255,0.4)" : "rgba(108,71,255,0.1)"}`, transition:"all 0.2s" }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:4 }}>
                <span style={{ fontSize:16, color:"#a78bfa" }}>▶</span>
                <span style={{ fontSize:14, fontWeight:500 }}>{v.title}</span>
              </div>
              <div style={{ fontSize:12, color:"#8888a8", marginRight:24 }}>{v.duration}</div>
              {v.quiz && v.quiz.length > 0 && (
                <div style={{ marginTop:4, marginRight:24 }}>
                  <span style={{ fontSize:11, background:"rgba(108,71,255,0.2)", color:"#a78bfa", padding:"2px 8px", borderRadius:10 }}>📝 {v.quiz.length} سؤال</span>
                </div>
              )}
              {v.quizFile && (
                <div style={{ marginTop:4, marginRight:24 }}>
                  <span style={{ fontSize:11, background:"rgba(34,197,94,0.15)", color:"#4ade80", padding:"2px 8px", borderRadius:10 }}>
                    {v.quizFile.type==="application/pdf" ? "📄" : "🖼️"} {v.quizFile.type==="application/pdf" ? "PDF" : "صورة"}
                  </span>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// =================== REGISTER PAGE ===================
function RegisterPage({ handleRegister, setPage, notify }) {
  const [form, setForm] = useState({ name:"", email:"", password:"", confirm:"" });
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmit = () => {
    setError("");
    if (form.password !== form.confirm) { setError("كلمة المرور غير متطابقة"); return; }
    setLoading(true);
    const result = handleRegister({ name: form.name, email: form.email, password: form.password });
    setLoading(false);
    if (!result.ok) { setError(result.error); return; }
    notify("تم إنشاء حسابك بنجاح! يمكنك الآن تسجيل الدخول");
    setPage("login");
  };

  return (
    <div style={{ minHeight:"80vh", display:"flex", alignItems:"center", justifyContent:"center", padding:20 }}>
      <div style={{ width:"100%", maxWidth:420 }}>
        <div className="card" style={{ padding:40 }}>
          <div style={{ textAlign:"center", marginBottom:32 }}>
            <div style={{ fontSize:40, marginBottom:12 }}>✨</div>
            <h1 style={{ fontSize:24, fontWeight:700, marginBottom:8 }}>إنشاء حساب جديد</h1>
            <p style={{ color:"#8888a8", fontSize:14 }}>انضم إلى أكاديمية البعد الجديد مجاناً</p>
          </div>
          {[
            { label:"الاسم الكامل", key:"name", type:"text", placeholder:"مثال: أحمد محمد" },
            { label:"البريد الإلكتروني", key:"email", type:"email", placeholder:"example@email.com" },
            { label:"كلمة المرور", key:"password", type:"password", placeholder:"6 أحرف على الأقل" },
            { label:"تأكيد كلمة المرور", key:"confirm", type:"password", placeholder:"أعد كتابة كلمة المرور" },
          ].map((f,i) => (
            <div key={i} style={{ marginBottom:18 }}>
              <label style={{ display:"block", fontSize:14, color:"#b0b0c8", marginBottom:8 }}>{f.label}</label>
              <input className="input-field" type={f.type} placeholder={f.placeholder} value={form[f.key]}
                onChange={e => setForm({...form, [f.key]: e.target.value})}
                onKeyDown={e => e.key==="Enter" && handleSubmit()} />
            </div>
          ))}
          {error && (
            <div style={{ background:"rgba(239,68,68,0.1)", border:"1px solid rgba(239,68,68,0.2)", borderRadius:10, padding:"12px 16px", marginBottom:20, color:"#f87171", fontSize:14 }}>
              ⚠️ {error}
            </div>
          )}
          <button className="btn-primary" style={{ width:"100%", fontSize:16, padding:"13px" }} onClick={handleSubmit} disabled={loading}>
            {loading ? "جارٍ التسجيل..." : "إنشاء الحساب"}
          </button>
          <div style={{ textAlign:"center", marginTop:20, fontSize:14, color:"#8888a8" }}>
            لديك حساب بالفعل؟{" "}
            <span style={{ color:"#a78bfa", cursor:"pointer", fontWeight:600 }} onClick={() => setPage("login")}>سجل دخولك</span>
          </div>
        </div>
      </div>
    </div>
  );
}

}

function VideoFormModal({ courseId, video, data, setData, notify, onClose }) {
  const [form, setForm] = useState(video ? { ...video } : { title:"", youtubeUrl:"", duration:"" });

  const save = () => {
    if (!form.title) { notify("أدخل عنوان الفيديو", "error"); return; }
    const ytId = extractYouTubeId(form.youtubeUrl || form.youtubeId || "");
    if (video) {
      setData(d => ({...d, courses: d.courses.map(c => c.id===courseId ? {
        ...c, videos: c.videos.map(v => v.id===video.id ? { ...v, title:form.title, youtubeId:ytId, duration:form.duration } : v)
      } : c)}));
      notify("تم تحديث الفيديو");
    } else {
      const newV = { id: Date.now(), title:form.title, youtubeId:ytId, duration:form.duration || "غير محدد", quiz:[] };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>

          <label style={{ display:"block", fontSize:13, color:"#b0b0c8", marginBottom:6 }}>عنوان الفيديو *</label>
          <input className="input-field" value={form.title} onChange={e => setForm({...form, title:e.target.value})} placeholder="مثال: مقدمة في التكامل" />

          <label style={{ display:"block", fontSize:13, color:"#b0b0c8", marginBottom:6 }}>رابط يوتيوب</label>
          <input className="input-field" value={form.youtubeUrl || form.youtubeId || ""} onChange={e => setForm({...form, youtubeUrl:e.target.value})} placeholder="https://youtube.com/watch?v=... أو ID مباشرة" />

          <button className="btn-outline" style={{ flex:1 }} onClick={onClose}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}

// =================== QUIZ EDITOR MODAL ===================
function QuizEditorModal({ courseId, videoId, data, setData, notify, onClose }) {
  const course = data.courses.find(c => c.id===courseId);
  const video = course && course.videos && course.videos.find(v => v.id===videoId);
  const [questions, setQuestions] = useState(video && video.quiz ? JSON.parse(JSON.stringify(video.quiz)) : []);
  // نوع الامتحان: "questions" أو "file"
  const [quizType, setQuizType] = useState(video && video.quizFile ? "file" : "questions");
  const [quizFile, setQuizFile] = useState(video && video.quizFile ? video.quizFile : null); // { name, type, data }
  const [dragOver, setDragOver] = useState(false);

  const addQuestion = () => {
    setQuestions(prev => [...prev, { q:"", options:["","","",""], answer:0 }]);
  };
  const updateQuestion = (qi, field, val) => {
    setQuestions(prev => prev.map((q, i) => i===qi ? { ...q, [field]:val } : q));
  };
  const updateOption = (qi, oi, val) => {
    setQuestions(prev => prev.map((q, i) => {
      if (i!==qi) return q;
      const opts = [...q.options]; opts[oi] = val;
      return { ...q, options:opts };
    }));
  };
  const deleteQuestion = (qi) => {
    setQuestions(prev => prev.filter((_, i) => i!==qi));
  };

  const handleFile = (file) => {
    if (!file) return;
    const allowed = ["application/pdf", "image/png", "image/jpeg", "image/jpg", "image/gif", "image/webp"];
    if (!allowed.includes(file.type)) { notify("فقط PDF أو صورة (PNG, JPG, GIF, WEBP)", "error"); return; }
    if (file.size > 5 * 1024 * 1024) { notify("الحجم الأقصى 5 ميجا", "error"); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      setQuizFile({ name: file.name, type: file.type, data: e.target.result });
    };
    reader.readAsDataURL(file);
  };

  const save = () => {
    if (quizType === "file") {
      setData(d => ({...d, courses: d.courses.map(c => c.id===courseId ? {
        ...c, videos: c.videos.map(v => v.id===videoId ? { ...v, quiz:[], quizFile: quizFile } : v)
      } : c)}));
    } else {
      setData(d => ({...d, courses: d.courses.map(c => c.id===courseId ? {
        ...c, videos: c.videos.map(v => v.id===videoId ? { ...v, quiz:questions, quizFile:null } : v)
      } : c)}));
    }
    notify("تم حفظ الامتحان");
    onClose();
  };

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal-box" style={{ maxWidth:600 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:20 }}>
          <h2 style={{ fontSize:18, fontWeight:700 }}>تعديل امتحان: {video && video.title}</h2>
          <button onClick={onClose} style={{ background:"transparent", border:"none", color:"#8888a8", fontSize:22, cursor:"pointer" }}>×</button>
        </div>

        {/* اختيار نوع الامتحان */}
        <div style={{ display:"flex", gap:10, marginBottom:24 }}>
          {[{id:"questions", label:"📝 أسئلة نصية"}, {id:"file", label:"📎 ملف PDF أو صورة"}].map(t => (
            <button key={t.id} onClick={() => setQuizType(t.id)}
              style={{ flex:1, padding:"10px", borderRadius:10, border:`2px solid ${quizType===t.id ? "#6c47ff" : "rgba(108,71,255,0.2)"}`,
                background: quizType===t.id ? "rgba(108,71,255,0.2)" : "transparent",
                color: quizType===t.id ? "#a78bfa" : "#8888a8", cursor:"pointer", fontWeight:600, fontSize:14, transition:"all 0.2s" }}>
              {t.label}
            </button>
          ))}
        </div>

        {/* أسئلة نصية */}
        {quizType === "questions" && (
          <div>
            {questions.map((q, qi) => (
              <div key={qi} style={{ background:"rgba(255,255,255,0.03)", border:"1px solid rgba(108,71,255,0.15)", borderRadius:12, padding:16, marginBottom:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                  <span style={{ fontWeight:600, fontSize:14 }}>سؤال {qi+1}</span>
                  <button className="btn-danger" style={{ padding:"3px 10px", fontSize:12 }} onClick={() => deleteQuestion(qi)}>حذف</button>
                </div>
                <input className="input-field" style={{ marginBottom:12 }} value={q.q} onChange={e => updateQuestion(qi, "q", e.target.value)} placeholder="نص السؤال" />
                {q.options.map((opt, oi) => (
                  <div key={oi} style={{ display:"flex", gap:8, marginBottom:8, alignItems:"center" }}>
                    <input type="radio" name={`ans-${qi}`} checked={q.answer===oi} onChange={() => updateQuestion(qi, "answer", oi)}
                      style={{ accentColor:"#6c47ff", width:16, height:16, cursor:"pointer", flexShrink:0 }} />
                    <input className="input-field" style={{ flex:1, padding:"8px 12px" }} value={opt} onChange={e => updateOption(qi, oi, e.target.value)} placeholder={`الخيار ${String.fromCharCode(65+oi)}`} />
                  </div>
                ))}
                <p style={{ fontSize:12, color:"#a78bfa", marginTop:6 }}>● الإجابة الصحيحة: الخيار {String.fromCharCode(65+q.answer)}</p>
              </div>
            ))}
            <button className="btn-outline" style={{ width:"100%", marginBottom:16 }} onClick={addQuestion}>+ إضافة سؤال</button>
          </div>
        )}

        {/* رفع ملف */}
        {quizType === "file" && (
          <div style={{ marginBottom:20 }}>
            <div
              onDragOver={e => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={e => { e.preventDefault(); setDragOver(false); handleFile(e.dataTransfer.files[0]); }}
              onClick={() => document.getElementById("quizFileInput").click()}
              style={{ border:`2px dashed ${dragOver ? "#6c47ff" : "rgba(108,71,255,0.3)"}`,
                borderRadius:14, padding:"32px 20px", textAlign:"center", cursor:"pointer",
                background: dragOver ? "rgba(108,71,255,0.1)" : "rgba(255,255,255,0.02)", transition:"all 0.2s" }}>
              <div style={{ fontSize:40, marginBottom:10 }}>{quizFile ? (quizFile.type==="application/pdf" ? "📄" : "🖼️") : "📎"}</div>
              {quizFile ? (
                <div>
                  <p style={{ color:"#4ade80", fontWeight:600, marginBottom:6 }}>✓ {quizFile.name}</p>
                  <p style={{ color:"#8888a8", fontSize:13 }}>اضغط لتغيير الملف</p>
                </div>
              ) : (
                <div>
                  <p style={{ color:"#b0b0c8", fontWeight:600, marginBottom:6 }}>اسحب الملف هنا أو اضغط للاختيار</p>
                  <p style={{ color:"#8888a8", fontSize:13 }}>PDF أو صورة (PNG, JPG, GIF, WEBP) — الحد الأقصى 5 ميجا</p>
                </div>
              )}
              <input id="quizFileInput" type="file" accept=".pdf,image/*" style={{ display:"none" }}
                onChange={e => handleFile(e.target.files[0])} />
            </div>

            {/* معاينة */}
            {quizFile && (
              <div style={{ marginTop:16, background:"rgba(255,255,255,0.03)", border:"1px solid rgba(108,71,255,0.15)", borderRadius:12, padding:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                  <span style={{ fontWeight:600, fontSize:14 }}>معاينة الملف</span>
                  <button className="btn-danger" style={{ padding:"3px 10px", fontSize:12 }} onClick={() => setQuizFile(null)}>إزالة</button>
                </div>
                {quizFile.type === "application/pdf" ? (
                  <iframe src={quizFile.data} style={{ width:"100%", height:300, borderRadius:8, border:"none" }} />
                ) : (
                  <img src={quizFile.data} alt="معاينة" style={{ maxWidth:"100%", maxHeight:300, borderRadius:8, display:"block", margin:"0 auto" }} />
                )}
              </div>
            )}
          </div>
        )}

        <div style={{ display:"flex", gap:12 }}>
          <button className="btn-primary" style={{ flex:1 }} onClick={save}>حفظ الامتحان</button>
          <button className="btn-outline" style={{ flex:1 }} onClick={onClose}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}

              <div>
                <div style={{ display:"flex", gap:12, alignItems:"center", marginBottom:8 }}>
                  <span style={{ fontWeight:600 }}>{r.user}</span>
                  <span className="badge badge-blue" style={{ fontSize:11 }}>{r.course}</span>
                  <span className={`badge ${r.status==="approved"?"badge-green":"badge-yellow"}`}>{r.status==="approved"?"معتمد":"قيد المراجعة"}</span>
                </div>
                <div style={{ color:"#facc15", marginBottom:6 }}>{"★".repeat(r.rating)}{"☆".repeat(5-r.rating)}</div>
                <p style={{ color:"#b0b0c8", fontSize:14 }}>{r.text}</p>
                <p style={{ color:"#6868888", fontSize:12, marginTop:6 }}>{r.date}</p>
              </div>
              <div style={{ display:"flex", gap:8 }}>
                {r.status==="pending" && <button className="btn-success" onClick={() => updateReview(r.id,"approved")}>قبول</button>}
                <button className="btn-danger" onClick={() => deleteReview(r.id)}>حذف</button>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// =================== ADMIN SETTINGS ===================
function AdminSettings({ data, setData, notify }) {
  const [s, setS] = useState(data.settings);
  const save = () => {
    setData(d => ({...d, settings:s}));
    notify("تم حفظ الإعدادات");
  };
  return (
    <div>
      <h1 style={{ fontSize:24, fontWeight:700, marginBottom:24 }}>إعدادات الموقع</h1>
      <div className="grid-2" style={{ gap:24 }}>
        <div className="card">
          <h3 style={{ fontWeight:700, marginBottom:20, fontSize:16 }}>معلومات الموقع</h3>
          {[
            { label:"اسم الموقع", key:"siteName", type:"text" },
            { label:"البريد الإلكتروني", key:"siteEmail", type:"email" },
            { label:"رقم الهاتف", key:"sitePhone", type:"text" },
            { label:"الموقع", key:"siteLocation", type:"text" },
          ].map((f,i) => (
            <div key={i} style={{ marginBottom:16 }}>
              <label style={{ display:"block", fontSize:13, color:"#b0b0c8", marginBottom:6 }}>{f.label}</label>
              <input className="input-field" type={f.type} value={s[f.key]} onChange={e => setS({...s, [f.key]:e.target.value})} />
            </div>
          ))}
        </div>
        <div className="card">
          <h3 style={{ fontWeight:700, marginBottom:20, fontSize:16 }}>إعدادات النظام</h3>
          {[
            { label:"وضع الصيانة", key:"maintenanceMode" },
            { label:"السماح بالتسجيل", key:"allowRegistration" },
          ].map((f,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"14px 0", borderBottom:"1px solid rgba(255,255,255,0.05)" }}>
              <span style={{ fontSize:14 }}>{f.label}</span>
              <div onClick={() => setS({...s, [f.key]:!s[f.key]})} style={{ width:44, height:24, borderRadius:12, background:s[f.key]?"#6c47ff":"rgba(255,255,255,0.1)", cursor:"pointer", position:"relative", transition:"background 0.2s" }}>
                <div style={{ width:20, height:20, borderRadius:"50%", background:"white", position:"absolute", top:2, transition:"right 0.2s", right:s[f.key]?2:22 }} />
              </div>
            </div>
          ))}
        </div>
      </div>
      <button className="btn-primary" style={{ marginTop:24, padding:"12px 32px" }} onClick={save}>حفظ الإعدادات</button>
    </div>
  );
}

// =================== ADMIN PANEL ===================
function AdminPanel({ data, setData, adminSection, setAdminSection, setModal, notify, syncUsers }) {
  const sections = [
    { id:"dashboard", label:"لوحة التحكم", icon:"📊" },
    { id:"users", label:"المستخدمون", icon:"👥" },
    { id:"courses", label:"الدورات", icon:"📚" },
    { id:"reviews", label:"التقييمات", icon:"⭐" },
    { id:"settings", label:"الإعدادات", icon:"⚙️" },
  ];

  return (
    <div style={{ display:"flex", minHeight:"calc(100vh - 64px)" }}>
      <div style={{ width:240, background:"rgba(255,255,255,0.02)", borderLeft:"1px solid rgba(108,71,255,0.1)", padding:"24px 16px", flexShrink:0 }}>
        <div style={{ marginBottom:16, fontSize:12, color:"#6868888", padding:"0 16px" }}>القائمة الرئيسية</div>
        {sections.map(s => (
          <div key={s.id} className={`sidebar-item ${adminSection===s.id?"active":""}`} onClick={() => setAdminSection(s.id)}>
            <span>{s.icon}</span><span>{s.label}</span>
          </div>
        ))}
      </div>
      <div style={{ flex:1, padding:32, overflowY:"auto" }}>
        {adminSection === "dashboard" && <AdminDashboard data={data} />}
        {adminSection === "users" && <AdminUsers data={data} setData={setData} setModal={setModal} notify={notify} syncUsers={syncUsers} />}
        {adminSection === "courses" && <AdminCourses data={data} setData={setData} setModal={setModal} notify={notify} />}
        {adminSection === "reviews" && <AdminReviews data={data} setData={setData} notify={notify} />}
        {adminSection === "settings" && <AdminSettings data={data} setData={setData} notify={notify} />}
      </div>
    </div>
  );
}

// =================== MODAL (إضافة/تعديل) ===================
function Modal({ modal, setModal, data, setData, notify, syncUsers }) {
  const [form, setForm] = useState(
    modal.type === "editCourse" ? { ...modal.courseData } :
    modal.type === "addUser" ? { name:"", email:"", role:"student", password:"" } :
    { title:"", icon:"📖", category:"الرياضيات", units:1, lessons:10, price:0 }
  );

  const handleSubmit = () => {
    if (modal.type === "addUser") {
      if (!form.name || !form.email || !form.password) { notify("يرجى ملء جميع الحقول", "error"); return; }
      const result = DB.addUser({ name: form.name, email: form.email, password: form.password, role: form.role });
      if (!result.ok) { notify(result.error, "error"); return; }
      // تحديث الدور إذا كان غير student
      if (form.role !== "student") DB.update(result.user.id, { role: form.role });
      syncUsers && syncUsers();
      notify("تم إضافة المستخدم");
    } else if (modal.type === "addCourse") {
      if (!form.title) { notify("يرجى إدخال اسم الدورة", "error"); return; }
      const newCourse = { id: Date.now(), ...form, status:"published", students:0, teacher:"المدير", videos:[] };
      setData(d => ({...d, courses:[...d.courses, newCourse]}));
      notify("تم إضافة الدورة");
    } else if (modal.type === "editCourse") {
      setData(d => ({...d, courses:d.courses.map(c => c.id===form.id ? { ...form, videos: c.videos||[] } : c)}));
      notify("تم تحديث الدورة");
    }
    setModal(null);
  };

  const userFields = [
    { label:"الاسم الكامل", key:"name", type:"text" },
    { label:"البريد الإلكتروني", key:"email", type:"email" },
    { label:"كلمة المرور", key:"password", type:"password" },
  ];
  const courseFields = [
    { label:"اسم الدورة", key:"title", type:"text" },
    { label:"الأيقونة (رمز)", key:"icon", type:"text" },
    { label:"عدد الوحدات", key:"units", type:"number" },
    { label:"السعر (0 = مجاني)", key:"price", type:"number" },
  ];
  const fields = modal.type === "addUser" ? userFields : courseFields;
  const title = modal.type === "addUser" ? "إضافة مستخدم جديد" : modal.type === "addCourse" ? "إضافة دورة جديدة" : "تعديل الدورة";

  return (
    <div className="modal-overlay" onClick={e => e.target===e.currentTarget && setModal(null)}>
      <div className="modal-box">
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:24 }}>
          <h2 style={{ fontSize:20, fontWeight:700 }}>{title}</h2>
          <button onClick={() => setModal(null)} style={{ background:"transparent", border:"none", color:"#8888a8", fontSize:22, cursor:"pointer" }}>×</button>
        </div>
        {fields.map((f,i) => (
          <div key={i} style={{ marginBottom:16 }}>
            <label style={{ display:"block", fontSize:13, color:"#b0b0c8", marginBottom:6 }}>{f.label}</label>
            <input className="input-field" type={f.type} value={form[f.key] || ""} onChange={e => setForm({...form, [f.key]: f.type==="number" ? Number(e.target.value) : e.target.value})} />
          </div>
        ))}
        {(modal.type==="addUser") && (
          <div style={{ marginBottom:16 }}>
            <label style={{ display:"block", fontSize:13, color:"#b0b0c8", marginBottom:6 }}>الدور</label>
            <select className="input-field" value={form.role} onChange={e => setForm({...form, role:e.target.value})}>
              <option value="student">طالب</option>
              <option value="teacher">معلم</option>
              <option value="admin">مدير</option>
            </select>
          </div>
        )}
        {(modal.type==="addCourse" || modal.type==="editCourse") && (
          <div style={{ marginBottom:16 }}>
            <label style={{ display:"block", fontSize:13, color:"#b0b0c8", marginBottom:6 }}>الفئة</label>
            <select className="input-field" value={form.category} onChange={e => setForm({...form, category:e.target.value})}>
              <option>الرياضيات</option>
              <option>الفيزياء</option>
            </select>
          </div>
        )}
        <div style={{ display:"flex", gap:12, marginTop:8 }}>
          <button className="btn-primary" style={{ flex:1 }} onClick={handleSubmit}>حفظ</button>
          <button className="btn-outline" style={{ flex:1 }} onClick={() => setModal(null)}>إلغاء</button>
        </div>
      </div>
    </div>
  );
}

// =================== APP ===================
function App() {
  const [page, setPage] = useState("home");
  const [user, setUser] = useState(null);
  const [data, setData] = useState(() => ({
    ...initialData,
    users: DB.getAllSafe(),
  }));
  const [loginForm, setLoginForm] = useState({ email: "", password: "" });
  const [loginError, setLoginError] = useState("");
  const [adminSection, setAdminSection] = useState("dashboard");
  const [modal, setModal] = useState(null);
  const [notification, setNotification] = useState(null);
  const [selectedCourse, setSelectedCourse] = useState(null);
  const [filterCat, setFilterCat] = useState("الكل");

  // مزامنة قائمة المستخدمين مع DB عند أي تغيير
  const syncUsers = () => {
    setData(d => ({ ...d, users: DB.getAllSafe() }));
  };

  const notify = (msg, type = "success") => {
    setNotification({ msg, type });
    setTimeout(() => setNotification(null), 3000);
  };

  const handleLogin = () => {
    const result = DB.login({ email: loginForm.email, password: loginForm.password });
    if (!result.ok) {
      setLoginError(result.error);
      return;
    }
    const found = result.user;
    setLoginError("");
    if (found.role === "admin") {
      setUser(found);
      setPage("admin");
      notify("مرحباً بك في لوحة التحكم");
    } else {
      setUser(found);
      setPage("dashboard");
      notify("مرحباً بك " + found.name);
    }
  };

  const handleLogout = () => { setUser(null); setPage("home"); notify("تم تسجيل الخروج"); };

  // دالة التسجيل الجديد
  const handleRegister = (formData) => {
    const result = DB.register(formData);
    if (!result.ok) return result;
    syncUsers();
    return result;
  };

  const navItems = [
    { label: "الرئيسية", id: "home" },
    { label: "الدورات", id: "courses" },
    ...(user && user.role === "admin" ? [{ label: "الإدارة", id: "admin" }] : []),
  ];

  return (
    <div style={{ fontFamily:"'Segoe UI', Tahoma, sans-serif", background:"#0a0a0f", color:"#e8e8f0", minHeight:"100vh", position:"relative" }}>
      {notification && (
        <div style={{ position:"fixed", top:20, left:"50%", transform:"translateX(-50%)", background: notification.type==="success" ? "rgba(34,197,94,0.9)" : "rgba(239,68,68,0.9)", color:"white", padding:"12px 24px", borderRadius:12, zIndex:9999, fontWeight:600, animation:"slideIn 0.3s", boxShadow:"0 8px 30px rgba(0,0,0,0.3)" }}>
          {notification.msg}
        </div>
      )}

      {modal && <Modal modal={modal} setModal={setModal} data={data} setData={setData} notify={notify} syncUsers={syncUsers} />}

      <nav style={{ position:"sticky", top:0, zIndex:100, background:"rgba(10,10,15,0.85)", backdropFilter:"blur(20px)", borderBottom:"1px solid rgba(108,71,255,0.15)", padding:"0 40px", display:"flex", alignItems:"center", justifyContent:"space-between", height:64 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <span style={{ fontSize:22, cursor:"pointer" }} onClick={() => setPage("home")}>
            <span style={{ color:"#e8e8f0", fontWeight:700 }}>أكاديمية </span>
            <span className="neon-text" style={{ fontWeight:800 }}>البعد الجديد</span>
          </span>
          <span style={{ fontSize:20 }}>🎓</span>
        </div>
        <div style={{ display:"flex", gap:4 }}>
          {navItems.map(n => (
            <span key={n.id} className={`nav-link ${page===n.id?"active":""}`} onClick={() => setPage(n.id)}>{n.label}</span>
          ))}
        </div>
        <div>
          {user ? (
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              <div style={{ width:36, height:36, borderRadius:"50%", background:"linear-gradient(135deg,#6c47ff,#a855f7)", display:"flex", alignItems:"center", justifyContent:"center", fontWeight:700, fontSize:14 }}>{user.avatar}</div>
              <button className="btn-outline" style={{ padding:"7px 14px", fontSize:13 }} onClick={handleLogout}>خروج</button>
            </div>
          ) : (
            <button className="btn-primary" style={{ padding:"9px 20px" }} onClick={() => setPage("login")}>تسجيل دخول</button>
          )}
        </div>
      </nav>

      {page === "home" && <HomePage setPage={setPage} data={data} setSelectedCourse={setSelectedCourse} filterCat={filterCat} setFilterCat={setFilterCat} />}
      {page === "courses" && <CoursesPage data={data} setPage={setPage} setSelectedCourse={setSelectedCourse} filterCat={filterCat} setFilterCat={setFilterCat} />}
      {page === "course-view" && <CourseViewPage course={selectedCourse} setPage={setPage} user={user} notify={notify} data={data} setData={setData} />}
      {page === "login" && <LoginPage loginForm={loginForm} setLoginForm={setLoginForm} handleLogin={handleLogin} loginError={loginError} setPage={setPage} />}
      {page === "register" && <RegisterPage handleRegister={handleRegister} setPage={setPage} notify={notify} />}
      {page === "dashboard" && user && <StudentDashboard user={user} data={data} setPage={setPage} setSelectedCourse={setSelectedCourse} />}
      {page === "admin" && user && user.role === "admin" && <AdminPanel data={data} setData={setData} adminSection={adminSection} setAdminSection={setAdminSection} setModal={setModal} notify={notify} syncUsers={syncUsers} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
