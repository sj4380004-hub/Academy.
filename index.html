      { id:3, name:"سارة علي", email:"sara@student.com", password:"student123", role:"student", status:"active", joined:"2024-04-10", avatar:"س" },
      { id:4, name:"محمد خالد", email:"m.khalid@teacher.com", password:"teacher123", role:"teacher", status:"active", joined:"2024-02-01", avatar:"م" },
      { id:5, name:"فاطمة حسن", email:"fatima@student.com", password:"student123", role:"student", status:"banned", joined:"2024-05-01", avatar:"ف" },
    ];
 
    function _load() {
      try { const r = localStorage.getItem(KEY); if (r) return JSON.parse(r); } catch(_) {}
      _save(defaultUsers); return defaultUsers;
    }
    function _save(users) { try { localStorage.setItem(KEY, JSON.stringify(users)); } catch(_) {} }
    function _sanitize(u) { const {password, ...safe} = u; return safe; }
 
    function getAll() { return _load(); }
    function getAllSafe() { return _load().map(_sanitize); }
    function findByEmail(email) { return _load().find(u => u.email.toLowerCase() === email.toLowerCase()) || null; }
    function findById(id) { return _load().find(u => u.id === id) || null; }
 
    function register({name, email, password}) {
      const users = _load();
      if (!name || name.trim().length < 2) return { ok:false, error:"الاسم يجب أن يحتوي على حرفين على الأقل" };
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return { ok:false, error:"البريد الإلكتروني غير صحيح" };
      if (!password || password.length < 6) return { ok:false, error:"كلمة المرور يجب أن تكون 6 أحرف على الأقل" };
      if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) return { ok:false, error:"البريد الإلكتروني مسجل مسبقاً" };
      const newUser = { id:Date.now(), name:name.trim(), email:email.toLowerCase().trim(), password, role:"student", status:"active", joined:new Date().toISOString().split("T")[0], avatar:name.trim()[0] };
      users.push(newUser); _save(users);
      return { ok:true, user:_sanitize(newUser) };
    }
 
    function login({email, password}) {
      const user = findByEmail(email);
      if (!user) return { ok:false, error:"البريد الإلكتروني غير مسجل" };
      if (user.password !== password) return { ok:false, error:"كلمة المرور غير صحيحة" };
      if (user.status === "banned") return { ok:false, error:"هذا الحساب موقوف، تواصل مع الإدارة" };
      return { ok:true, user:_sanitize(user) };
    }
 
    function remove(id) { _save(_load().filter(u => u.id !== id)); }
    function toggleBan(id) { _save(_load().map(u => u.id===id ? {...u, status: u.status==="banned"?"active":"banned"} : u)); }
    function update(id, fields) { _save(_load().map(u => u.id===id ? {...u, ...fields} : u)); }
    function addUser({name, email, password="123456", role="student"}) {
      const result = register({name, email, password});
      if (result.ok && role !== "student") update(result.user.id, {role});
      return result;
    }
    function reset() { _save(defaultUsers); }
 
    return { getAll, getAllSafe, findByEmail, findById, register, login, remove, toggleBan, update, addUser, reset };
  })();
  </script>
