  <script>
  const DB = (() => {
    function _sanitize(u) { if(!u) return null; const {password, ...safe} = u; return safe; }

    async function getAll() {
      try {
        const { data, error } = await supabaseClient.from('users').select('*').order('id', { ascending: true });
        if (error) throw error;
        return data || [];
      } catch (e) { console.error("DB.getAll error:", e); return []; }
    }

    async function getAllSafe() {
      const users = await getAll();
      return users.map(_sanitize);
    }

    async function findByEmail(email) {
      try {
        const { data, error } = await supabaseClient.from('users').select('*').eq('email', email.toLowerCase()).maybeSingle();
        if (error) throw error;
        return data || null;
      } catch (e) { console.error("DB.findByEmail error:", e); return null; }
    }

    async function findById(id) {
      try {
        const { data, error } = await supabaseClient.from('users').select('*').eq('id', id).maybeSingle();
        if (error) throw error;
        return data || null;
      } catch (e) { console.error("DB.findById error:", e); return null; }
    }

    async function register({name, email, password}) {
      if (!name || name.trim().length < 2) return { ok:false, error:"الاسم يجب أن يحتوي على حرفين على الأقل" };
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return { ok:false, error:"البريد الإلكتروني غير صحيح" };
      if (!password || password.length < 6) return { ok:false, error:"كلمة المرور يجب أن تكون 6 أحرف على الأقل" };
      
      const existing = await findByEmail(email);
      if (existing) return { ok:false, error:"البريد الإلكتروني مسجل مسبقاً" };

      const newUser = { 
        name: name.trim(), 
        email: email.toLowerCase().trim(), 
        password: password, 
        role: "student", 
        status: "active", 
        joined: new Date().toISOString().split("T")[0], 
        avatar: name.trim()[0] 
      };

      const { data, error } = await supabaseClient.from('users').insert([newUser]).select().single();
      if (error) return { ok:false, error: error.message };
      return { ok:true, user: _sanitize(data) };
    }

    async function login({email, password}) {
      const user = await findByEmail(email);
      if (!user) return { ok:false, error:"البريد الإلكتروني غير مسجل" };
      if (user.password !== password) return { ok:false, error:"كلمة المرور غير صحيحة" };
      if (user.status === "banned") return { ok:false, error:"هذا الحساب موقوف، تواصل مع الإدارة" };
      return { ok:true, user: _sanitize(user) };
    }

    async function remove(id) {
      const { error } = await supabaseClient.from('users').delete().eq('id', id);
      if (error) throw error;
    }

    async function toggleBan(id) {
      const user = await findById(id);
      if (!user) return;
      const newStatus = user.status === "banned" ? "active" : "banned";
      const { error } = await supabaseClient.from('users').update({ status: newStatus }).eq('id', id);
      if (error) throw error;
    }

    async function update(id, fields) {
      const { error } = await supabaseClient.from('users').update(fields).eq('id', id);
      if (error) throw error;
    }

    async function addUser({name, email, password="123456", role="student"}) {
      const result = await register({name, email, password});
      if (result.ok && role !== "student") {
        await update(result.user.id, {role});
        result.user.role = role;
      }
      return result;
    }

    return { getAll, getAllSafe, findByEmail, findById, register, login, remove, toggleBan, update, addUser };
  })();

  // =================== SITE CHANGES DB ===================
  const SiteDB = (() => {
    async function get() {
      try {
        const [coursesRes, settingsRes, linksRes, videosRes, questionsRes, optionsRes, reviewsRes] = await Promise.all([
          supabaseClient.from('courses').select('*').order('id', { ascending: true }),
          supabaseClient.from('site_settings').select('*'),
          supabaseClient.from('useful_links').select('*').order('sort_order', { ascending: true }),
          supabaseClient.from('videos').select('*').order('sort_order', { ascending: true }),
          supabaseClient.from('quiz_questions').select('*').order('sort_order', { ascending: true }),
          supabaseClient.from('quiz_options').select('*').order('option_index', { ascending: true }),
          supabaseClient.from('reviews').select('*').eq('status', 'approved')
        ]);

        if (coursesRes.error) throw coursesRes.error;

        const settingsObj = {};
        if (settingsRes.data) {
          settingsRes.data.forEach(s => settingsObj[s.setting_key] = s.setting_value);
        }

        const videos = videosRes.data || [];
        const questions = questionsRes.data || [];
        const options = optionsRes.data || [];

        const transformedCourses = (coursesRes.data || []).map(c => {
          const courseVideos = videos.filter(v => v.course_id === c.id).map(v => {
            const videoQuestions = questions.filter(q => q.video_id === v.id).map(q => {
              return {
                q: q.question,
                answer: q.answer_index,
                options: options.filter(o => o.question_id === q.id).map(o => o.option_text)
              };
            });
            return { ...v, youtubeId: v.youtube_id, quiz: videoQuestions };
          });
          return { ...c, videos: courseVideos };
        });

        return {
          courses: transformedCourses,
          settings: settingsObj,
          links: linksRes.data || [],
          reviews: reviewsRes.data || []
        };
      } catch (e) {
        console.error("SiteDB.get error:", e);
        throw e;
      }
    }

    async function saveLinks(links) {
      await supabaseClient.from('useful_links').delete().neq('id', 0);
      const { error } = await supabaseClient.from('useful_links').insert(links.map((l, i) => ({
        title: l.title,
        description: l.desc || l.description,
        url: l.url,
        icon: l.icon,
        color: l.color,
        sort_order: i + 1
      })));
      if (error) throw error;
    }

    async function saveCourses(courses) {
      for (const course of courses) {
        const { error } = await supabaseClient.from('courses').upsert({
          id: course.id > 2000000000 ? undefined : course.id,
          title: course.title,
          icon: course.icon,
          category: course.category,
          units: course.units,
          price: course.price,
          status: course.status,
          students: course.students
        });
        if (error) console.error("Course upsert error:", error);
      }
    }

    async function saveSettings(settings) {
      const upserts = Object.entries(settings).map(([key, value]) => ({
        setting_key: key,
        setting_value: String(value),
        updated_at: new Date().toISOString()
      }));
      const { error } = await supabaseClient.from('site_settings').upsert(upserts);
      if (error) throw error;
    }

    return {
      get: get,
      saveLinks: saveLinks,
      saveCourses: saveCourses,
      saveSettings: saveSettings
    };
  })();
